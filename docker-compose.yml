# ============================================================
#  Stack complète : les 3 services de calcul + l'UX
#  Chaque service expose le MÊME contrat /calculate sur son port.
#
#    docker compose up -d            -> tout
#    docker compose up -d node-api   -> un seul service
# ============================================================

services:

  # --- API Node.js : service de CALCUL pur (comme java/python) ---
  node-api:
    build: ./back
    image: calculatorapi-node
    container_name: calculatorapi-node
    ports:
      - "3000:3000"
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    image: calculatorapi-auth
    container_name: calculatorapi-auth
    ports:
      - "4000:4000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    restart: unless-stopped

  # --- API Java (JUnit) ---
  java-api:
    build: ./back-java
    image: calculatorapi-java
    container_name: calculatorapi-java
    ports:
      - "3003:3001"
    restart: unless-stopped

  # --- API Python (pytest) ---
  python-api:
    build: ./back-python
    image: calculatorapi-python
    container_name: calculatorapi-python
    ports:
      - "3002:3002"
    restart: unless-stopped

  gateway:
    build: ./gateway
    image: calculatorapi-gateway
    container_name: calculatorapi-gateway
    ports:
      - "8088:8088"
    environment:
      CALC_BACKEND: ${CALC_BACKEND:-http://python-api:3002}
    restart: unless-stopped

  # --- Base de données PostgreSQL (vrai service réseau) ---
  db:
    image: postgres:16-alpine
    container_name: calculatorapi-db
    environment:
      POSTGRES_USER: calc
      POSTGRES_PASSWORD: calc
      POSTGRES_DB: calc_history
    volumes:
      - calc-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Microservice d'historique (Express + PostgreSQL) ---
  history-service:
    build: ./history-service
    image: calculatorapi-history
    container_name: calculatorapi-history
    ports:
      - "4500:4500"
    environment:
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGHOST: db
      PGUSER: calc
      PGPASSWORD: calc
      PGDATABASE: calc_history
    depends_on:
      - db
    restart: unless-stopped

  test:
    build:
      context: ./back
      target: test
    image: calculatorapi-test
    profiles: [ "test" ]
    volumes:
      - ./back/coverage:/app/coverage

  ux:
    build:
      context: ./front
    image: calculatorapi-ux
    container_name: calculatorapi-ux
    ports:
      - "8081:80"
    # Le front ne parle qu'à la passerelle : c'est sa seule vraie dépendance.
    depends_on:
      - gateway
    restart: unless-stopped

# Volume persistant pour les données PostgreSQL
volumes:
  calc-pgdata:
