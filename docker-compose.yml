# ============================================================
#  STACK DE BASE : gateway + auth + history + db + front (ux)
#  Le back de calcul n'est PAS ici : on le choisit via un
#  fichier d'override compose.<back>.yml.
#
#    docker compose -f docker-compose.yml -f compose.python.yml up -d --build
#    docker compose -f docker-compose.yml -f compose.java.yml   up -d --build
#    docker compose -f docker-compose.yml -f compose.node.yml   up -d --build
#
#  Chaque override ajoute SON back + règle CALC_BACKEND du gateway.
# ============================================================

services:

  auth-service:
    build: ./auth-service
    image: calculatorapi-auth
    container_name: calculatorapi-auth
    ports:
      - "4000:4000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    restart: unless-stopped

  gateway:
    build: ./gateway
    image: calculatorapi-gateway
    container_name: calculatorapi-gateway
    ports:
      - "8088:8088"
    # CALC_BACKEND est fourni par le fichier d'override (compose.<back>.yml).
    restart: unless-stopped

  # --- Base de données PostgreSQL (vrai service réseau) ---
  db:
    image: postgres:16-alpine
    container_name: calculatorapi-db
    environment:
      POSTGRES_USER: calc
      POSTGRES_PASSWORD: calc
      POSTGRES_DB: calc_history
    volumes:
      - calc-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Microservice d'historique (Express + PostgreSQL) ---
  history-service:
    build: ./history-service
    image: calculatorapi-history
    container_name: calculatorapi-history
    ports:
      - "4500:4500"
    environment:
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGHOST: db
      PGUSER: calc
      PGPASSWORD: calc
      PGDATABASE: calc_history
    depends_on:
      - db
    restart: unless-stopped

  test:
    build:
      context: ./back
      target: test
    image: calculatorapi-test
    profiles: [ "test" ]
    volumes:
      - ./back/coverage:/app/coverage

  ux:
    build:
      context: ./front
    image: calculatorapi-ux
    container_name: calculatorapi-ux
    ports:
      - "8081:80"
    # Le front ne parle qu'à la passerelle : c'est sa seule vraie dépendance.
    depends_on:
      - gateway
    restart: unless-stopped

# Volume persistant pour les données PostgreSQL
volumes:
  calc-pgdata:
