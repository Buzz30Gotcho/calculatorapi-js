# ============================================================
#  Stack complète : les 3 services de calcul + l'UX
#  Chaque service expose le MÊME contrat /calculate sur son port.
#
#    docker compose up -d            -> tout
#    docker compose up -d node-api   -> un seul service
# ============================================================
services:
  # --- API Node.js (référence, utilisée par le front) ---
  #     Persiste l'historique en SQLite + vérifie les JWT Supabase.
  node-api:
    build: ./back
    image: calculatorapi-node
    container_name: calculatorapi-node
    ports:
      - "3000:3000"
    environment:
      DB_PATH: /app/data/history.db
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
    volumes:
      - calc-history:/app/data
    restart: unless-stopped

  # --- Microservice d'authentification (proxy Supabase) ---
  auth-service:
    build: ./auth-service
    image: calculatorapi-auth
    container_name: calculatorapi-auth
    ports:
      - "4000:4000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    restart: unless-stopped

  # --- API Java (JUnit) ---
  java-api:
    build: ./back-java
    image: calculatorapi-java
    container_name: calculatorapi-java
    ports:
      - "3001:3001"
    restart: unless-stopped

  # --- API Python (pytest) ---
  python-api:
    build: ./back-python
    image: calculatorapi-python
    container_name: calculatorapi-python
    ports:
      - "3002:3002"
    restart: unless-stopped

  # --- Tests Node dans un conteneur (profil "test") ---
  test:
    build:
      context: ./back
      target: test
    image: calculatorapi-test
    profiles: [ "test" ]
    volumes:
      - ./back/coverage:/app/coverage

  # --- Interface web (front statique) — parle à node-api (:3000) et auth-service (:4000) ---
  ux:
    build:
      context: ./front
    image: calculatorapi-ux
    container_name: calculatorapi-ux
    ports:
      - "8081:80"
    depends_on:
      - node-api
      - auth-service
    restart: unless-stopped

# Volume persistant pour la base SQLite de l'historique
volumes:
  calc-history:
