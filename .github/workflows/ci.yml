name: CI — Tests & Couverture

on:
  push:
    branches: ["**"] # Tous les push, sur toutes les branches
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back # package.json vit dans back/
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          
      - run: npm install
      - run: npm run lint

  test:
    name: Tests Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: lint # Attend que le lint réussisse
    defaults:
      run:
        working-directory: back # package.json vit dans back/
    strategy:
      fail-fast: false # Teste les deux versions même si l'une échoue
      matrix:
        node-version: ["22.x", "24.x"]
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          
      - run: npm install
      - run: npm run test:ci
      
      - name: Upload du rapport de couverture
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: back/coverage/
          retention-days: 30

  test-java:
    name: Tests Java (JUnit)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: back-java
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: maven

      - run: mvn -B test

  test-python:
    name: Tests Python (pytest)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: back-python
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
      - run: python -m pytest

  test-auth:
    name: Tests auth-service (Jest)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - run: npm install
      - run: npm run test:ci

  docker:
    name: Build & smoke test Docker
    runs-on: ubuntu-latest
    needs: [test, test-java, test-python, test-auth] # Tous les tests doivent passer
    steps:
      - uses: actions/checkout@v5

      # 1. Construire les deux images (API + UX)
      - name: Build de l'image API
        run: docker build -t calculatorapi ./back

      - name: Build de l'image UX
        run: docker build -t calculatorapi-ux ./front

      # 2. Démarrer la stack complète
      - name: Démarrer les conteneurs
        run: docker compose up -d

      # 3. Smoke test : vérifier que l'API et l'UX répondent
      - name: Smoke test API (calcul 200)
        run: |
          for i in $(seq 1 10); do
            curl -sf "http://localhost:3000/calculate?operation=add&a=2&b=3" && break
            echo "API pas encore prête, nouvelle tentative ($i)..."
            sleep 1
          done
          result=$(curl -s "http://localhost:3000/calculate?operation=add&a=2&b=3")
          echo "Réponse API : $result"
          echo "$result" | grep -q '"result":5'

      - name: Smoke test API (erreur 400 chaîne)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:3000/calculate?operation=add&a=abc&b=3")
          echo "Status attendu 400, reçu : $status"
          test "$status" = "400"

      - name: Smoke test API Java (calcul 200)
        run: |
          for i in $(seq 1 20); do
            curl -sf "http://localhost:3001/calculate?operation=add&a=2&b=3" && break
            echo "API Java pas encore prête, nouvelle tentative ($i)..."
            sleep 2
          done
          result=$(curl -s "http://localhost:3001/calculate?operation=add&a=2&b=3")
          echo "Réponse Java : $result"
          echo "$result" | grep -q '"result":5'

      - name: Smoke test API Python (calcul 200)
        run: |
          for i in $(seq 1 15); do
            curl -sf "http://localhost:3002/calculate?operation=add&a=2&b=3" && break
            echo "API Python pas encore prête, nouvelle tentative ($i)..."
            sleep 1
          done
          result=$(curl -s "http://localhost:3002/calculate?operation=add&a=2&b=3")
          echo "Réponse Python : $result"
          echo "$result" | grep -q '"result":5'

      - name: Smoke test auth-service (/health)
        run: |
          for i in $(seq 1 15); do
            curl -sf "http://localhost:4000/health" && break
            echo "auth-service pas encore prêt, nouvelle tentative ($i)..."
            sleep 1
          done
          status=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:4000/health")
          echo "Status attendu 200, reçu : $status"
          test "$status" = "200"

      - name: Smoke test UX (page servie)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8081/")
          echo "Status attendu 200, reçu : $status"
          test "$status" = "200"

      # 4. Tests E2E Playwright contre la stack démarrée
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Installer les dépendances et le navigateur
        working-directory: e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Tests E2E Playwright
        working-directory: e2e
        env:
          BASE_URL: http://localhost:8081
        run: npx playwright test

      - name: Upload des traces Playwright (si échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/test-results/
          if-no-files-found: ignore
          retention-days: 30

      # 5. Nettoyage
      - name: Logs des conteneurs (si échec)
        if: failure()
        run: docker compose logs

      - name: Arrêter les conteneurs
        if: always()
        run: docker compose down


